/* MR.JEFFREY — single-file app. Extreme minimalism × extreme dimensionality. White volume, one ink, three
   mode accents; the few objects are deeply dimensional floating slabs. Honesty encoded: a row can only be as
   loud as its grade; the speedup bar can never cross its Amdahl-ceiling wall. */
:root{
  --page:#fafaf8;--card:#fff;--ink:#1a1a17;--ink-2:#55534c;--muted:#85827a;
  --line:rgba(0,0,0,.12);--line-soft:rgba(0,0,0,.07);
  --fast:#0e9fb5;--fast-deep:#0b5566;--fast-tint:#e4f6f9;
  --normal:#ba7517;--normal-deep:#633806;--normal-tint:#faeeda;
  --extend:#534ab7;--extend-deep:#26215c;--extend-tint:#eeedfe;
  --exact:#3b6d11;--exact-bg:#eaf3de;--prob:#444441;--prob-bg:#f1efe8;--decline:#5f5e5a;--decline-bg:#f1efe8;
  --free:#0f766e;--free-bg:#e6f3f1;--pick:#44423c;--wall:rgba(0,0,0,.52);--track:#efeee9;
  --r:8px;--r-lg:12px;--focus:#534ab7;--persp:1100px;
  --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",monospace;
  --accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint);
  --slab:0 1px 1px rgba(20,20,23,.03),0 2px 4px rgba(20,20,23,.035),0 6px 12px rgba(20,20,23,.045),0 14px 28px rgba(20,20,23,.05),0 30px 60px rgba(20,20,23,.06),0 60px 110px rgba(20,20,23,.05);
}
:root[data-theme="dark"]{
  --page:#0e0e10;--card:#171719;--ink:#eceae3;--ink-2:#b7b4ac;--muted:#8c897f;
  --line:rgba(255,255,255,.15);--line-soft:rgba(255,255,255,.08);
  --fast-tint:#0b5566;--normal-tint:#633806;--extend-tint:#26215c;
  --exact:#9ad16a;--exact-bg:#19260f;--prob:#c8c5bc;--prob-bg:#201f1b;--decline:#a8a49b;--decline-bg:#201f1b;
  --free:#5ec0b4;--free-bg:#13302c;--pick:#c8c5bc;--wall:rgba(255,255,255,.55);--track:#26262a;--focus:#a79ef5;
  --slab:0 2px 4px rgba(0,0,0,.4),0 8px 16px rgba(0,0,0,.45),0 18px 36px rgba(0,0,0,.5),0 40px 80px rgba(0,0,0,.55),0 80px 130px rgba(0,0,0,.5);
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--page);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-weight:500;letter-spacing:-.01em;margin:0}
h1{font-size:clamp(28px,4vw,46px);line-height:1.08}h2{font-size:21px}h3{font-size:16px}
p{margin:0 0 12px;color:var(--ink-2)}a{color:var(--accent-deep)}
.mono,.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
[data-mode="fast"]{--accent:var(--fast);--accent-deep:var(--fast-deep);--accent-tint:var(--fast-tint)}
[data-mode="normal"]{--accent:var(--normal);--accent-deep:var(--normal-deep);--accent-tint:var(--normal-tint)}
[data-mode="extend"]{--accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint)}
.app{min-height:100%;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line-soft);background:color-mix(in srgb,var(--page) 82%,transparent);backdrop-filter:saturate(1.2) blur(8px);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:9px;font-weight:500;letter-spacing:.02em}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);transition:.25s}
.brand small{color:var(--muted);font-weight:400}
.steps{display:flex;gap:2px;margin-left:8px;flex-wrap:wrap}
.steps button{font:inherit;font-size:12.5px;color:var(--muted);background:none;border:0;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.steps button:hover{color:var(--ink);background:var(--page)}
.steps button[aria-current="true"]{color:var(--ink);background:var(--accent-tint)}
.steps button:disabled{opacity:.4;cursor:not-allowed}.steps .n{font-family:var(--mono);font-size:11px;opacity:.7}
.spacer{margin-left:auto}
.ghost{font:inherit;font-size:13px;background:none;border:1px solid var(--line);color:var(--ink-2);padding:7px 12px;border-radius:var(--r);cursor:pointer}
.ghost:hover{border-color:var(--ink-2);color:var(--ink)}
main{flex:1;width:100%;max-width:1040px;margin:0 auto;padding:34px 22px 80px;perspective:var(--persp);perspective-origin:50% 22%;animation:screenIn .42s cubic-bezier(.2,.8,.2,1) both}
.wide{max-width:1180px}
@keyframes screenIn{from{opacity:0;transform:perspective(var(--persp)) translateY(14px) translateZ(-40px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.lead{font-size:16px;color:var(--ink-2);max-width:60ch}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grid{display:grid;gap:14px}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.cols-3,.cols-2{grid-template-columns:1fr}}
.btn{font:inherit;font-size:14px;font-weight:500;cursor:pointer;background:var(--accent);color:#fff;border:1px solid var(--accent-deep);padding:10px 18px;border-radius:var(--r);transition:filter .15s}
.btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.lg{font-size:15px;padding:12px 22px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
.kbd{font-family:var(--mono);font-size:12px;background:var(--track);padding:1px 6px;border-radius:5px}
.grade{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:999px;text-transform:lowercase}
.grade.exact{color:var(--exact);background:var(--exact-bg)}.grade.probabilistic{color:var(--prob);background:var(--prob-bg)}.grade.decline{color:var(--decline);background:var(--decline-bg)}
.grade .gd{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-free{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;color:var(--free);background:var(--free-bg)}
.badge-free .gd{width:6px;height:6px;border-radius:50%;background:currentColor}
.getkey{font-family:var(--mono);font-size:11.5px;color:var(--free);text-decoration:none}.getkey:hover{text-decoration:underline}
/* dimensionality */
.slab{position:relative;background:var(--card);border-radius:18px;padding:22px 24px;box-shadow:var(--slab);transform:perspective(var(--persp)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--lift,0px));transform-style:preserve-3d;transition:box-shadow .4s;will-change:transform}
.slab::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(177deg,rgba(255,255,255,.5),transparent 24%);opacity:.55}
:root[data-theme="dark"] .slab::before{background:linear-gradient(177deg,rgba(255,255,255,.08),transparent 24%)}
.slab::after{content:"";position:absolute;left:8%;right:8%;bottom:-26px;height:40px;z-index:-1;background:radial-gradient(60% 100% at 50% 0%,rgba(20,20,23,.16),transparent 70%);filter:blur(8px);transform:translateZ(-60px);opacity:.7}
.plane{transform:translateZ(var(--z,0px))}
.float-in{animation:floatIn .7s cubic-bezier(.2,.8,.2,1) both}
@keyframes floatIn{from{opacity:0;transform:perspective(var(--persp)) rotateX(10deg) translateY(26px) translateZ(-80px)}to{opacity:1;transform:none}}
.hero{display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:center;min-height:min(70vh,600px);padding:20px 0 60px}
.hero-copy h1{max-width:16ch}.hero-cap{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px}
@media(max-width:880px){.hero{grid-template-columns:1fr;gap:28px;min-height:0}.hero>div:last-child{order:-1}}
.tenets{margin:4px 0 40px;gap:36px}.feat h3{font-size:15px;margin-bottom:8px;position:relative;padding-top:14px}
.feat h3::before{content:"";position:absolute;top:0;left:0;width:22px;height:2px;background:var(--accent);border-radius:2px}
.feat p{margin:0}
.speed-slab{max-width:560px;margin:0 auto;width:100%}
.ss-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.ss-waste{font-family:var(--mono);font-size:13px;color:var(--ink-2)}
.meter3{position:relative;height:62px;border-radius:12px;background:var(--track);box-shadow:inset 0 2px 6px rgba(0,0,0,.08)}
.fill3{position:absolute;inset:0 auto 0 0;border-radius:12px 4px 4px 12px;background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 88%,white),var(--accent));box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 40%,transparent);transition:width .6s cubic-bezier(.2,.7,.2,1)}
.wall3{position:absolute;top:-10px;bottom:-10px;width:2px;background:var(--wall);border-radius:2px}
.wall3-lbl{position:absolute;bottom:-26px;right:0;white-space:nowrap;font-family:var(--mono);font-size:10px;color:var(--muted)}
.meter3-val{position:absolute;top:50%;left:16px;transform:translateY(-50%);font-family:var(--mono);font-size:22px;font-weight:500;color:#fff;mix-blend-mode:difference}
.ss-read{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:38px}
.ss-k{font-size:11px;color:var(--muted);display:block}.ss-v{font-family:var(--mono);font-size:17px;color:var(--ink)}
.slab-stack{display:flex;flex-direction:column;gap:52px;padding:22px 0 34px}
@media(max-width:560px){.ss-read{grid-template-columns:1fr;gap:8px}.meter3-val{font-size:18px}:root{--slab:0 2px 6px rgba(20,20,23,.06),0 10px 22px rgba(20,20,23,.07),0 24px 44px rgba(20,20,23,.06)}.slab::after{display:none}}
.mode-card{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;cursor:pointer;display:flex;flex-direction:column;gap:10px;font:inherit;color:var(--ink);transform:perspective(var(--persp)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--lift,0px));transition:box-shadow .35s,border-color .18s}
.mode-card:hover{border-color:var(--accent)}.mode-card[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 24px rgba(0,0,0,.06)}

.curve{display:block;overflow:visible;width:100%}.curve-axis{stroke:var(--line)}.curve-base{stroke:var(--line-soft);stroke-dasharray:3 4}
.curve-area{fill:var(--accent);opacity:.1}.curve-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round}
.curve-dot{fill:var(--card);stroke:var(--accent);stroke-width:2}.curve-lbl{font-family:var(--mono);font-size:10px;fill:var(--ink-2)}.curve-axlbl{font-family:var(--mono);font-size:9px;fill:var(--muted)}

@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:9px;background:var(--card);color:var(--ink);font-size:13.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:var(--slab);z-index:50;animation:toastIn .4s cubic-bezier(.2,.8,.2,1) both}

.mt{margin-top:14px}.muted{color:var(--muted)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

// heuristic, regex-based waste detection on the pasted code (STATIC mode). The SERVER does true AST analysis.
function detect(code){
  const found=[]; const add=(wt,ev)=>{ if(!found.some(f=>f.waste_type===wt)) found.push({waste_type:wt,evidence:ev}); };
  const lines=code.split("\n"); const listVars=new Set();
  lines.forEach(l=>{ const m=l.match(/(\w+)\s*=\s*\[/); if(m) listVars.add(m[1]); });
  const hasLoop=/\b(for|while)\b/.test(code);
  if(hasLoop){
    [...listVars].forEach(v=>{ if(new RegExp("\\bin\\s+"+v+"\\b").test(code)) add("list_as_set",`\`x in ${v}\` (a list) inside a loop → O(n) membership`); });
    if(/\b(fetch|get_|query|load|select_|lookup|find_)\w*\s*\(/.test(code)) add("n_plus_1","a per-item fetch/query inside a loop → N+1");

    if(/\.count\s*\(/.test(code)) add("accidental_quadratic","`.count()` inside a loop → O(n²)");
  }
  if(/\*\*\s*[234]\b/.test(code)) add("algo_replace","`x ** k` → strength-reducible");
  if(/math\.(sin|cos|sqrt|exp|log)\s*\(/.test(code)) add("simd_offload","scalar math.* over each element → SIMD/vectorizable");
  return found;
}

      return await r.json();

  const det=detect(code);
  const run=DATA.demo.runs.find(r=>r.mode===mode)||DATA.demo.runs[0];
  const types=new Set(det.map(d=>d.waste_type));
  const shipped=run.shipped.filter(s=>types.size===0?false:types.has(s.waste_type));
  const declined=run.declined.filter(s=>types.has(s.waste_type));
  // recompute a representative cumulative from the matched shipped rows (the last matched row's cumulative-so-far)
  const cumulative= shipped.length? shipped[shipped.length-1].ratio : 1.0;
  const policy=DATA.modes.find(m=>m.mode===mode);
  return { mode, detected:det, shipped, declined, cumulative_ratio:cumulative, z3_calls:(mode==="extend"&&shipped.length?run.z3_calls:0),

}

// ── pointer tilt on every .slab / .mode-card (real CSS 3D), reduced-motion safe ─────────────────────────
const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;
function attachTilt(el, max){
  if(REDUCE) return; let raf=0,tx=0,ty=0,cx=0,cy=0,tl=0,lift=0;
  const tick=()=>{ cx+=(tx-cx)*.12; cy+=(ty-cy)*.12; lift+=(tl-lift)*.12;
    el.style.setProperty("--rx",cx.toFixed(2)+"deg"); el.style.setProperty("--ry",cy.toFixed(2)+"deg"); el.style.setProperty("--lift",lift.toFixed(1)+"px");
    raf=(Math.abs(tx-cx)>.01||Math.abs(ty-cy)>.01||Math.abs(tl-lift)>.05)?requestAnimationFrame(tick):0; };
  el.addEventListener("pointermove",e=>{ const r=el.getBoundingClientRect(); tx=-((e.clientY-r.top)/r.height-.5)*max; ty=((e.clientX-r.left)/r.width-.5)*max; tl=6; if(!raf)raf=requestAnimationFrame(tick); });
  el.addEventListener("pointerleave",()=>{ tx=0;ty=0;tl=0; if(!raf)raf=requestAnimationFrame(tick); });
}

function compoundCurve(shipped, cumulative, mode){
  if(!shipped.length) return null;
  const pts=[1.0,...shipped.map(s=>s.ratio)]; const W=520,H=150,pX=34,pY=18;

  const line=pts.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const area=`${line} L${x(pts.length-1).toFixed(1)},${(H-pY).toFixed(1)} L${x(0).toFixed(1)},${(H-pY).toFixed(1)} Z`;
  const NS="http://www.w3.org/2000/svg"; const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.setAttribute("class","curve"); svg.setAttribute("role","img");
  svg.setAttribute("aria-label",`Cumulative whole-program speedup compounds to ${fmt(cumulative)} times over ${shipped.length} verified fixes, measured fresh.`);
  const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  svg.appendChild(mk("line",{x1:pX,y1:H-pY,x2:W-pX,y2:H-pY,class:"curve-axis"}));
  svg.appendChild(mk("line",{x1:pX,y1:y(1),x2:W-pX,y2:y(1),class:"curve-base"}));
  svg.appendChild(mk("path",{d:area,class:"curve-area"}));
  svg.appendChild(mk("path",{d:line,class:"curve-line"}));
  pts.forEach((v,i)=>{ svg.appendChild(mk("circle",{cx:x(i),cy:y(v),r:3.2,class:"curve-dot"}));
    if(i){const t=mk("text",{x:x(i),y:y(v)-8,class:"curve-lbl","text-anchor":"middle"});t.textContent=fmt(v)+"×";svg.appendChild(t);} });
  const head=$("div",{class:"ss-head",style:"margin-bottom:8px"},[$("span",{class:"ss-waste"},"cumulative compounding · measured fresh"),$("span",{class:"mono",style:"font-size:18px;font-weight:500"},fmt(cumulative,3)+"×")]);
  const slab=$("div",{class:"slab speed-slab float-in","data-mode":mode},[head,svg]);
  setTimeout(()=>attachTilt(slab,5),0);
  return $("div",{class:"stage"},[slab]);
}
