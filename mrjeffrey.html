<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>MR.JEFFREY — 안전하게 · 빠르게 · 정확하게</title>
<meta name="description" content="대화로 시작하세요. 일반 질문이면 답하고, 코드를 만들거나 고쳐 달라면 만들고 검증해 돌려드립니다. LLM은 제안만 하고, 무엇을 돌려줄지는 검증기가 정합니다." />
<style>
/* MR.JEFFREY — single-file app. Extreme minimalism × extreme dimensionality. White volume, one ink, three
   PILLAR accents (SECURED·FAST·ACCURATE); the few objects are deeply dimensional floating slabs. The entry is a
   CONVERSATION — type anything; a question is answered, a coding ask is built and verified. The engine's
   build-time internals never reach this surface. */
:root{
  --page:#fafaf8;--card:#fff;--ink:#1a1a17;--ink-2:#55534c;--muted:#85827a;
  --line:rgba(0,0,0,.12);--line-soft:rgba(0,0,0,.07);
  --fast:#0e9fb5;--fast-deep:#0b5566;--fast-tint:#e4f6f9;
  --normal:#ba7517;--normal-deep:#633806;--normal-tint:#faeeda;
  --extend:#534ab7;--extend-deep:#26215c;--extend-tint:#eeedfe;
  --free:#0f766e;--free-bg:#e6f3f1;--pick:#44423c;
  --r:8px;--r-lg:12px;--focus:#534ab7;--persp:1100px;
  --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR","Pretendard",Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",monospace;
  /* the three accent families are repurposed to the three PILLARS:
     SECURED → violet (extend, trust/depth) · FAST → teal (fast, speed) · ACCURATE → amber (normal, precision). */
  --accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint);
  --slab:0 1px 1px rgba(20,20,23,.03),0 2px 4px rgba(20,20,23,.035),0 6px 12px rgba(20,20,23,.045),0 14px 28px rgba(20,20,23,.05),0 30px 60px rgba(20,20,23,.06),0 60px 110px rgba(20,20,23,.05);
}
:root[data-theme="dark"]{
  --page:#0e0e10;--card:#171719;--ink:#eceae3;--ink-2:#b7b4ac;--muted:#8c897f;
  --line:rgba(255,255,255,.15);--line-soft:rgba(255,255,255,.08);
  --fast-tint:#0b5566;--normal-tint:#633806;--extend-tint:#26215c;
  /* ★ FIX: in dark mode the *tint* vars above are the deep accent colors, so the "deep" ink (used for
     glyphs, the p-word pill, and links) must flip to a LIGHT accent — otherwise it renders deep-on-deep
     (an empty-looking filled box) and links are unreadable. */
  --fast-deep:#67cfe2;--normal-deep:#e7b463;--extend-deep:#a79ef5;
  --free:#5ec0b4;--free-bg:#13302c;--pick:#c8c5bc;--focus:#a79ef5;--track:#26262a;
  --slab:0 2px 4px rgba(0,0,0,.4),0 8px 16px rgba(0,0,0,.45),0 18px 36px rgba(0,0,0,.5),0 40px 80px rgba(0,0,0,.55),0 80px 130px rgba(0,0,0,.5);
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--page);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-weight:500;letter-spacing:-.01em;margin:0}
h1{font-size:clamp(28px,4vw,46px);line-height:1.08}h2{font-size:21px}h3{font-size:16px}
p{margin:0 0 12px;color:var(--ink-2)}a{color:var(--accent-deep)}
.mono,.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
/* ★ the [data-mode] accent-swapping mechanism, repurposed to the three pillars */
[data-mode="secured"]{--accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint)}
[data-mode="fast"]{--accent:var(--fast);--accent-deep:var(--fast-deep);--accent-tint:var(--fast-tint)}
[data-mode="accurate"]{--accent:var(--normal);--accent-deep:var(--normal-deep);--accent-tint:var(--normal-tint)}
.app{min-height:100%;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line-soft);background:color-mix(in srgb,var(--page) 82%,transparent);backdrop-filter:saturate(1.2) blur(8px);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:9px;font-weight:500;letter-spacing:.02em}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);transition:.25s}
.brand small{color:var(--muted);font-weight:400}
.steps{display:flex;gap:2px;margin-left:8px;flex-wrap:wrap}
.steps button{font:inherit;font-size:12.5px;color:var(--muted);background:none;border:0;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.steps button:hover{color:var(--ink);background:var(--page)}
.steps button[aria-current="true"]{color:var(--ink);background:var(--accent-tint)}
.steps button:disabled{opacity:.4;cursor:not-allowed}.steps .n{font-family:var(--mono);font-size:11px;opacity:.7}
.spacer{margin-left:auto}
.ghost{font:inherit;font-size:13px;background:none;border:1px solid var(--line);color:var(--ink-2);padding:7px 12px;border-radius:var(--r);cursor:pointer}
.ghost:hover{border-color:var(--ink-2);color:var(--ink)}
main{flex:1;width:100%;max-width:1040px;margin:0 auto;padding:34px 22px 28px;perspective:var(--persp);perspective-origin:50% 22%;animation:screenIn .42s cubic-bezier(.2,.8,.2,1) both}
@keyframes screenIn{from{opacity:0;transform:perspective(var(--persp)) translateY(14px) translateZ(-40px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.lead{font-size:16px;color:var(--ink-2);max-width:62ch}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grid{display:grid;gap:14px}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.cols-3,.cols-2{grid-template-columns:1fr}}
.btn{font:inherit;font-size:14px;font-weight:500;cursor:pointer;background:var(--accent);color:#fff;border:1px solid var(--accent-deep);padding:10px 18px;border-radius:var(--r);transition:filter .15s}
.btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.lg{font-size:15px;padding:12px 22px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
.badge-free{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;color:var(--free);background:var(--free-bg)}
.badge-free .gd{width:6px;height:6px;border-radius:50%;background:currentColor}
.getkey{font-family:var(--mono);font-size:11.5px;color:var(--free);text-decoration:none}.getkey:hover{text-decoration:underline}
/* dimensionality — the 3D floating slab */
.slab{position:relative;background:var(--card);border-radius:18px;padding:22px 24px;box-shadow:var(--slab);transform:perspective(var(--persp)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--lift,0px));transform-style:preserve-3d;transition:box-shadow .4s;will-change:transform}
.slab::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(177deg,rgba(255,255,255,.5),transparent 24%);opacity:.55}
:root[data-theme="dark"] .slab::before{background:linear-gradient(177deg,rgba(255,255,255,.08),transparent 24%)}
.slab::after{content:"";position:absolute;left:8%;right:8%;bottom:-26px;height:40px;z-index:-1;background:radial-gradient(60% 100% at 50% 0%,rgba(20,20,23,.16),transparent 70%);filter:blur(8px);transform:translateZ(-60px);opacity:.7}
.float-in{animation:floatIn .55s cubic-bezier(.2,.8,.2,1) both}
@keyframes floatIn{from{opacity:0;transform:perspective(var(--persp)) rotateX(10deg) translateY(20px) translateZ(-60px)}to{opacity:1;transform:none}}
.hero{display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:center;min-height:min(60vh,520px);padding:20px 0 50px}
.hero-copy h1{max-width:18ch}
@media(max-width:880px){.hero{grid-template-columns:1fr;gap:28px;min-height:0}.hero>div:last-child{order:-1}}
.tenets{margin:4px 0 30px;gap:36px}.feat h3{font-size:15px;margin-bottom:8px;position:relative;padding-top:14px}
.feat h3::before{content:"";position:absolute;top:0;left:0;width:22px;height:2px;background:var(--accent);border-radius:2px}
.feat p{margin:0}
/* the three PILLAR slabs */
.pillar{text-align:left;padding:20px 22px}
.pillar .p-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pillar .glyph{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--accent-tint);color:var(--accent-deep);flex:none;font-size:17px}
.pillar .p-name{font-weight:600;font-size:16px;letter-spacing:.04em}
.pillar .p-word{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-tint);padding:2px 8px;border-radius:999px;margin-left:auto}
.pillar p{margin:0;font-size:14px;color:var(--ink-2)}
.hero-pillars{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;width:100%}
.hero-pillars .pillar{padding:16px 18px}
.glyph{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--accent-tint);color:var(--accent-deep);flex:none;font-size:16px}
.mode-card{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;font:inherit;color:var(--ink)}
.mode-card:hover{border-color:var(--accent)}.mode-card[aria-pressed="true"]{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick)}
.mc-head{display:flex;align-items:center;gap:10px}.mc-name{font-weight:500;font-size:15px}.mc-clock{font-family:var(--mono);font-size:11px;color:var(--muted)}
.provider-card .glyph{background:var(--track,#efeee9);color:var(--pick)}
.v-sub{color:var(--muted);font-size:12px}
.field{display:flex;flex-direction:column;gap:6px;margin:0 0 12px}.field label{font-size:13px;color:var(--ink-2)}
.field input{font:inherit;font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px}
.note{font-size:12.5px;color:var(--muted)}.note.good{color:var(--free)}.note.warn{color:var(--normal-deep)}
.honesty{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);background:var(--card);border:1px dashed var(--line);border-radius:var(--r);padding:12px 14px;margin:16px 0 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 22px;margin:0 0 16px}
.spin{width:15px;height:15px;border:2px solid var(--accent-tint);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:9px;background:var(--card);color:var(--ink);font-size:13.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:var(--slab);z-index:50;animation:toastIn .4s cubic-bezier(.2,.8,.2,1) both}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
.footer{color:var(--muted);font-size:12px;text-align:center;padding:18px;border-top:1px solid var(--line)}
.mt{margin-top:14px}.muted{color:var(--muted)}
/* ── CHAT ──────────────────────────────────────────────────────────────────────────────────────── */
.chatwrap{display:flex;flex-direction:column;min-height:calc(100vh - 150px);max-width:840px;margin:0 auto}
.thread{flex:1;display:flex;flex-direction:column;gap:18px;padding:6px 0 18px}
.msg{display:flex;gap:11px;align-items:flex-start}
.msg.user{justify-content:flex-end}
.av{width:28px;height:28px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:12px;font-family:var(--mono);font-weight:600;background:var(--accent-tint);color:var(--accent-deep);margin-top:2px}
.bubble{border-radius:14px;padding:12px 15px;font-size:14.5px;line-height:1.62;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(--accent);color:#fff;border:1px solid var(--accent-deep);border-bottom-right-radius:4px;max-width:80%}
.msg.bot .bubble{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px;flex:1;min-width:0}
.stagerow{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 4px}
.stagerow:empty{display:none}
.stage{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ink-2);background:var(--page);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
.stage.run{border-color:var(--accent);color:var(--accent-deep)}.stage.done{color:var(--free);border-color:color-mix(in srgb,var(--free) 40%,var(--line))}
.codeblock{margin:10px 0 0}
.codeblock .cb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.codeblock pre{white-space:pre;overflow:auto;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin:0;max-height:460px;tab-size:4}
.reslabel{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--mono);padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
.tag.ok{color:var(--free);border-color:color-mix(in srgb,var(--free) 45%,var(--line))}
.tag.fast{color:var(--fast-deep);background:var(--fast-tint);border-color:transparent}
.tag.warn{color:var(--normal-deep);background:var(--normal-tint);border-color:transparent}
.tag.bad{color:#c0392b;border-color:#c0392b}
.asklist{margin:8px 0 0;padding-left:18px}.asklist li{margin:3px 0;color:var(--ink-2);font-size:14px}
.composer{position:sticky;bottom:0;background:color-mix(in srgb,var(--page) 88%,transparent);backdrop-filter:blur(8px);padding:10px 0 14px}
.toolrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 8px}
.chip{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12px;background:var(--card);border:1px solid var(--line);color:var(--ink-2);border-radius:999px;padding:5px 11px;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--ink)}
.chip.on{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-tint)}
.cbox{display:flex;gap:10px;align-items:flex-end;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px 8px 8px 14px;box-shadow:var(--slab)}
.cbox textarea{flex:1;border:0;background:none;resize:none;font:inherit;font-size:14.5px;color:var(--ink);outline:none;max-height:200px;line-height:1.5;padding:6px 0}
.send{flex:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--accent-deep);background:var(--accent);color:#fff;cursor:pointer;font-size:17px;display:grid;place-items:center}
.send:disabled{opacity:.4;cursor:not-allowed}
.empty{text-align:center;padding:40px 16px 26px}
.empty h2{font-size:24px;margin-bottom:8px}.empty p{max-width:46ch;margin:0 auto 4px}
.exgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:560px;margin:20px auto 0}
@media(max-width:560px){.exgrid{grid-template-columns:1fr}}
.ex{font:inherit;font-size:13px;background:var(--card);border:1px solid var(--line);color:var(--ink-2);border-radius:10px;padding:11px 13px;cursor:pointer;text-align:left}
.ex:hover{border-color:var(--accent);color:var(--ink)}
.ex b{display:block;color:var(--ink);font-weight:500;margin-bottom:3px;font-size:12px}
.ex .ee{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:560px){:root{--slab:0 2px 6px rgba(20,20,23,.06),0 10px 22px rgba(20,20,23,.07),0 24px 44px rgba(20,20,23,.06)}.slab::after{display:none}.msg.user .bubble{max-width:90%}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// The product is three words: SECURED · FAST · ACCURATE. The DATA blob carries ONLY what the UI needs —
// the provider list (real) and the session-only key policy. No engine build-time internals reach this surface.
const DATA = {
  "pillars":[
    {"id":"secured","word":"SECURED","name":"안전하게","glyph":"⛨",
     "line":"필요한 곳의 취약점과 부채널 누수를 닫습니다 — 그리고 필요 없는 곳은 건드리지 않습니다."},
    {"id":"fast","word":"FAST","name":"빠르게","glyph":"⚡",
     "line":"진짜 구조가 있는 곳에선 실제로 빠르게, 없는 곳에선 정직하게 그대로."},
    {"id":"accurate","word":"ACCURATE","name":"정확하게","glyph":"✓",
     "line":"보여드리기 전에, 모든 변경이 같은 결과를 내는지 확인합니다."}
  ],
  "providers":[
    {"id":"anthropic","label":"Claude (official)","transport":"anthropic_sdk","default_model":"claude-opus-4-8","free_no_card":false,"key_label":"Anthropic API key","get_key_url":"https://console.anthropic.com/settings/keys"},
    {"id":"openai","label":"ChatGPT (OpenAI)","transport":"openai_chat","default_model":"gpt-4o","free_no_card":false,"key_label":"OpenAI API key","get_key_url":"https://platform.openai.com/api-keys"},
    {"id":"gemini","label":"Gemini (Google)","transport":"gemini_generate","default_model":"gemini-3.5-flash","free_no_card":true,"key_label":"Google AI Studio API key","get_key_url":"https://aistudio.google.com/apikey"},
    {"id":"groq","label":"Groq","transport":"openai_chat","default_model":"llama-3.3-70b-versatile","free_no_card":true,"key_label":"Groq API key","get_key_url":"https://console.groq.com/keys"},
    {"id":"mistral","label":"Mistral","transport":"openai_chat","default_model":"mistral-large-latest","free_no_card":false,"key_label":"Mistral API key","get_key_url":"https://console.mistral.ai/api-keys"},
    {"id":"cohere","label":"Cohere","transport":"openai_chat","default_model":"command-r-plus","free_no_card":false,"key_label":"Cohere API key","get_key_url":"https://dashboard.cohere.com/api-keys"},
    {"id":"deepseek","label":"DeepSeek","transport":"openai_chat","default_model":"deepseek-chat","free_no_card":false,"key_label":"DeepSeek API key","get_key_url":"https://platform.deepseek.com/api_keys"},
    {"id":"xai","label":"Grok (xAI)","transport":"openai_chat","default_model":"grok-2-latest","free_no_card":false,"key_label":"xAI API key","get_key_url":"https://console.x.ai"},
    {"id":"together","label":"Together AI","transport":"openai_chat","default_model":"meta-llama/Llama-3.3-70B-Instruct-Turbo","free_no_card":false,"key_label":"Together API key","get_key_url":"https://api.together.ai/settings/api-keys"},
    {"id":"fireworks","label":"Fireworks AI","transport":"openai_chat","default_model":"llama-v3p3-70b-instruct","free_no_card":false,"key_label":"Fireworks API key","get_key_url":"https://fireworks.ai/account/api-keys"},
    {"id":"openrouter","label":"OpenRouter","transport":"openai_chat","default_model":"openai/gpt-4o","free_no_card":true,"key_label":"OpenRouter API key","get_key_url":"https://openrouter.ai/keys"},
    {"id":"perplexity","label":"Perplexity","transport":"openai_chat","default_model":"sonar","free_no_card":false,"key_label":"Perplexity API key","get_key_url":"https://www.perplexity.ai/settings/api"},
    {"id":"openai_compat","label":"OpenAI-compatible gateway","transport":"openai_chat","default_model":"","free_no_card":false,"key_label":"OpenAI-compatible gateway API key","get_key_url":null},
    {"id":"anthropic_compat","label":"Claude-compatible gateway","transport":"anthropic_sdk","default_model":"claude-opus-4-8","free_no_card":false,"key_label":"Claude-compatible gateway API key","get_key_url":null}
  ],
  "modes":[
    {"id":"fast","name":"빠르게","note":"가벼운 검증 — 빠른 응답"},
    {"id":"normal","name":"표준","note":"기본 — 균형"},
    {"id":"extend","name":"깊게","note":"더 깊은 검증·탐색"}
  ],
  "key_policy":"API 키는 세션 전용입니다: 이 브라우저 탭에서 요청에만 쓰이고, 저장·로그·커밋되지 않으며, 당신이 고른 제공자 외 어디로도 전송되지 않습니다.",
  "account_policy":"계정은 아이디와 비밀번호, 그리고 지난 대화만 저장합니다 — API 키는 절대 저장하지 않습니다. 키는 매 세션 다시 붙여넣으며, 이 탭에만 머뭅니다.",
  "examples":[
    {"kind":"질문","label":"일반 질문","text":"파이썬에서 리스트와 튜플의 차이가 뭐야?"},
    {"kind":"질문","label":"개념 설명","text":"해시 테이블이 평균 O(1)인 이유를 설명해줘."},
    {"kind":"코딩","label":"코드 생성","text":"정수 리스트를 받아 중복을 제거하고 순서를 유지해 돌려주는 파이썬 함수를 만들어줘."},
    {"kind":"코딩","label":"더 빠르게","text":"이 함수를 더 빠르게 만들어줘:\ndef total(n):\n    s = 0\n    for k in range(n):\n        s += k * k\n    return s"}
  ]
};
</script>
<script>
"use strict";
// MR.JEFFREY single-file app — conversation-first. Type anything: a question is answered (no verify label),
// a coding ask is generated → verified → optimized live over /api/stream (SSE). The intent is classified on the
// server (IN.classify_intent). The API key is held in a JS variable for this tab only, never stored.
const $ = (t, p = {}, kids = []) => {
  const e = document.createElement(t);
  for (const k in p) {
    if (k === "class") e.className = p[k];
    else if (k === "html") e.innerHTML = p[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), p[k]);
    else if (k === "style") e.setAttribute("style", p[k]);
    else if (p[k] != null) e.setAttribute(k, p[k]);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach((c) => c != null && e.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
  return e;
};
const STEPS = [["landing","0","개요"],["chat","1","대화"]];
const STAGE_LABEL = { classify:"분류", thinking:"생각 중", generate:"코드 생성", verify:"동치 검증", fix:"수정", optimize:"최적화" };

const S = { screen:"landing", provider:null, key:"", model:"", mode:"normal",
  messages:[], input:"", streaming:false, settingsOpen:false, keyState:{phase:"idle"},
  live:false, theme:(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"),
  toast:null, account:null, authPanel:false, files:[], error:null };
let TOAST_T = null;

const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;
function attachTilt(el, max){
  if(REDUCE) return; let raf=0,tx=0,ty=0,cx=0,cy=0,tl=0,lift=0;
  const tick=()=>{ cx+=(tx-cx)*.12; cy+=(ty-cy)*.12; lift+=(tl-lift)*.12;
    el.style.setProperty("--rx",cx.toFixed(2)+"deg"); el.style.setProperty("--ry",cy.toFixed(2)+"deg"); el.style.setProperty("--lift",lift.toFixed(1)+"px");
    raf=(Math.abs(tx-cx)>.01||Math.abs(ty-cy)>.01||Math.abs(tl-lift)>.05)?requestAnimationFrame(tick):0; };
  el.addEventListener("pointermove",e=>{ const r=el.getBoundingClientRect(); tx=-((e.clientY-r.top)/r.height-.5)*max; ty=((e.clientX-r.left)/r.width-.5)*max; tl=6; if(!raf)raf=requestAnimationFrame(tick); });
  el.addEventListener("pointerleave",()=>{ tx=0;ty=0;tl=0; if(!raf)raf=requestAnimationFrame(tick); });
}
function setScreen(s){ S.screen=s; render(); if(s==="chat") setTimeout(()=>{const t=document.getElementById("composer-input"); t&&t.focus();},30); }
function showToast(m){ S.toast=m; render(); clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>{S.toast=null;render();},3000); }

const ERR = {
  network:"네트워크 오류 — 연결에 실패했습니다. 잠시 후 다시 시도하세요.",
  no_engine:"라이브 엔진에 연결되지 않았습니다 — 백엔드(server)가 실행 중이어야 대화가 동작합니다.",
  auth:"인증 실패 — 이메일/비밀번호를 확인하세요.", unknown:"오류가 발생했습니다 — 다시 시도하세요." };

// ── pillar slab (landing) ───────────────────────────────────────────────────────────────────────
function pillarSlab(p){
  const slab=$("div",{class:"slab pillar float-in","data-mode":p.id},[
    $("div",{class:"p-head"},[$("span",{class:"glyph"},p.glyph),$("span",{class:"p-name"},p.name),$("span",{class:"p-word"},p.word)]),
    $("p",{},p.line),
  ]);
  setTimeout(()=>attachTilt(slab,6),0);
  return slab;
}

// ── accounts (id + password + history only; the API key is NEVER part of the account) ─────────────
async function doAuth(kind){
  const email=(S._email||"").trim(), pw=S._pw||"";
  if(!email||!pw){ S.error=ERR.auth; render(); return; }
  if(!S.live){ S.account={email,demo:true,history:[]}; S.authPanel=false; showToast("데모 — 라이브 백엔드에서 실제 계정이 동작합니다"); return; }
  try{
    const r=await fetch("/api/auth/"+kind,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email,password:pw})});
    const j=await r.json();
    if(!j.ok){ S.error=ERR.auth; render(); return; }
    S.account={email,history:[]}; S.authPanel=false; S._pw=""; await loadHistory();
    showToast("로그인됨 — 키는 저장되지 않으니 다시 붙여넣으세요");
  }catch(e){ S.error=ERR.network; render(); }
}
async function loadHistory(){
  if(!S.live||!S.account){ return; }
  try{ const r=await fetch("/api/history"); const j=await r.json(); S.account.history=j.work||[]; render(); }catch(e){ /* honest: none if backend down */ }
}
function doLogout(){ if(S.live){ fetch("/api/auth/logout",{method:"POST"}).catch(()=>{}); } S.account=null; render(); }

async function validateKey(){
  const p=S.provider; if(!p||!S.key){return;}
  S.keyState={phase:"checking"}; render();
  if(S.live){
    try{ const r=await fetch("/api/key/validate",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({provider:p,key:S.key,model:S.model||undefined})}); const j=await r.json(); S.keyState={phase:j.ok?"ok":"bad",res:j}; render(); return; }
    catch(e){ S.keyState={phase:"bad",res:{detail:String(e)}}; render(); return; }
  }
  const prov=DATA.providers.find(x=>x.id===p);
  S.keyState={phase:"bad",res:{blocked:true,detail:"정적 빌드(서버 없음): 라이브 키 확인은 백엔드가 필요합니다. 키 발급: "+(prov&&prov.get_key_url||"")}};
  render();
}

// ── the conversation: build history (only code-producing turns carry context to the server) ───────
function buildHistory(){
  const h=[]; let lastUser=null;
  for(const m of S.messages){
    if(m.role==="user") lastUser=m.text;
    else if(m.role==="assistant" && m.kind==="code" && m.code && lastUser!=null) h.push({request:lastUser, code:m.code});
  }
  return h;
}

// ── apply one SSE event to the in-flight assistant message ────────────────────────────────────────
function applyEvent(a, ev){
  if(ev.type==="stage"){
    const lbl=STAGE_LABEL[ev.stage]||ev.stage;
    if(!a.stages.includes(lbl)) a.stages.push(lbl);
  } else if(ev.type==="thinking"){ /* covered by stage */
  } else if(ev.type==="chat"){ a.kind="chat"; a.text=ev.reply||""; }
  else if(ev.type==="note"){ a.kind="note"; a.text=ev.text||""; }
  else if(ev.type==="ask"){ a.kind="ask"; a.asks=ev.asks||[]; }
  else if(ev.type==="token"){ a.kind="code"; a.code=(a.code||"")+(ev.text||""); }
  else if(ev.type==="code_done"){ a.kind="code"; a.code=ev.code||a.code; }
  else if(ev.type==="verify"){ a.verify={status:ev.status,tier:ev.tier,counterexample:ev.counterexample}; }
  else if(ev.type==="optimized"){ a.optimized={closed_form:ev.closed_form,speedup:ev.speedup}; }
  else if(ev.type==="done"){ a.summary=ev.summary||{}; if(a.summary.kind && a.kind==="pending") a.kind=a.summary.kind;
    if(a.summary.kind==="code" && a.summary.optimization) a.optimization=a.summary.optimization; }
  else if(ev.type==="error"){ a.error=ev.message||ERR.unknown; }
}

function scrollChat(){ const t=document.getElementById("thread"); if(t) requestAnimationFrame(()=>{ t.scrollTop=t.scrollHeight; window.scrollTo(0,document.body.scrollHeight); }); }

// ── send a message → stream the real pipeline ────────────────────────────────────────────────────
async function sendMessage(text, opts){
  opts=opts||{};
  text=(text!=null?text:S.input||"").trim();
  if(!text||S.streaming) return;
  if(!opts.silent) S.messages.push({role:"user", text});
  const a={role:"assistant", kind:"pending", stages:[], code:"", text:"", userText:text, busy:true};
  S.messages.push(a);
  S.input=""; S.streaming=true; S.error=null; render(); scrollChat();
  if(!S.live){ a.kind="error"; a.error=ERR.no_engine; a.busy=false; S.streaming=false; render(); scrollChat(); return; }
  const body={ prompt:text, mode:S.mode, history:buildHistory(),
    apiKey:S.key||undefined, provider:S.provider||undefined, model:S.model||undefined, force:!!opts.force };
  try{
    const resp=await fetch("/api/stream",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    if(!resp.ok||!resp.body) throw new Error("HTTP "+resp.status);
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf="";
    for(;;){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i;
      while((i=buf.indexOf("\n\n"))>=0){
        const block=buf.slice(0,i); buf=buf.slice(i+2);
        const dl=block.split("\n").find(l=>l.startsWith("data:")); if(!dl) continue;
        let ev; try{ ev=JSON.parse(dl.slice(5).trim()); }catch(_){ continue; }
        applyEvent(a, ev); render(); scrollChat();
      }
    }
  }catch(e){ a.error=ERR.network; }
  if(a.kind==="pending") a.kind = a.error?"error":(a.code?"code":"chat");
  a.busy=false; S.streaming=false; render(); scrollChat();
  // persist a finished code turn for a logged-in user (request/code/labels only — never the key)
  if(S.live && S.account && a.kind==="code" && a.code){
    const tier=(a.verify&&a.verify.tier)|| (a.summary&&a.summary.proof_tier)||"";
    fetch("/api/work/save",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({request:a.userText, code:a.code, status:(a.summary&&a.summary.status)||"", proof_tier:tier})}).catch(()=>{});
  }
}

// ── render one assistant message ─────────────────────────────────────────────────────────────────
function renderAssistant(a){
  const body=$("div",{class:"bubble"});
  // live stages
  if(a.stages&&a.stages.length){
    const row=$("div",{class:"stagerow"});
    a.stages.forEach((s,idx)=>{ const last=idx===a.stages.length-1;
      const cls="stage "+(a.busy&&last?"run":"done");
      row.appendChild($("span",{class:cls},[ a.busy&&last?$("span",{class:"spin"}):$("span",{},"✓"), " "+s ]));
    });
    body.appendChild(row);
  }
  if(a.busy && !a.text && !a.code && (!a.asks||!a.asks.length) && (!a.stages||!a.stages.length))
    body.appendChild($("div",{class:"note"},[$("span",{class:"spin"})," 생각 중…"]));

  if(a.kind==="chat" && a.text) body.appendChild($("div",{},a.text));
  if(a.kind==="note"){ body.appendChild($("div",{class:"eyebrow",style:"margin:0 0 6px"},"범위 안내"));
    body.appendChild($("div",{},a.text||"")); }
  if(a.kind==="ask"){
    body.appendChild($("div",{},"코딩 작업으로 보입니다 — 정확히 만들려면 조금만 더 알려주세요:"));
    const ul=$("ul",{class:"asklist"}); (a.asks||[]).forEach(q=>ul.appendChild($("li",{},q))); body.appendChild(ul);
    body.appendChild($("div",{class:"row",style:"margin-top:8px"},[
      $("button",{class:"ghost",onclick:()=>sendMessage(a.userText,{force:true,silent:true})},"그대로 진행 →"),
      $("span",{class:"v-sub"},"또는 위 내용을 답해 다시 보내세요."),
    ]));
  }
  if(a.kind==="code" && (a.code||a.busy)){
    const cb=$("div",{class:"codeblock"},[
      $("div",{class:"cb-head"},[ $("span",{class:"v-sub"}, a.busy?"코드 생성 중…":"돌려받은 코드"),
        a.code?$("button",{class:"ghost",style:"padding:3px 9px;font-size:12px",onclick:()=>{navigator.clipboard&&navigator.clipboard.writeText(a.code);showToast("복사했습니다");}},"복사"):null ]),
      $("pre",{},a.code||"…"),
    ]);
    body.appendChild(cb);
    // ACCURATE + FAST labels — only what the engine actually returned (honest)
    const tags=$("div",{class:"reslabel"});
    if(a.verify){
      if(a.verify.status==="proven") tags.appendChild($("span",{class:"tag ok"},"✓ 정확하게 — 원본과 같은 결과로 증명됨"+(a.verify.tier?" ("+a.verify.tier+")":"")));
      else if(a.verify.status==="refuted") tags.appendChild($("span",{class:"tag bad"},"✗ 반례 발견 — 그 변경은 적용하지 않았습니다"));
      else tags.appendChild($("span",{class:"tag"},"정확하게 — 경계 검증 통과"+(a.verify.tier?" ("+a.verify.tier+")":"")));
    }
    const opt=a.optimized||(a.optimization&&a.optimization.optimized?a.optimization:null);
    if(opt && (opt.closed_form||opt.speedup)) tags.appendChild($("span",{class:"tag fast"},"⚡ 빠르게 — "+(opt.closed_form?("닫힌 형식 "+opt.closed_form):"최적화 적용")+(opt.speedup?("  ×"+opt.speedup):"")));
    else if(a.optimization && a.optimization.optimized===false) tags.appendChild($("span",{class:"tag"},"빠르게 — 바꿀 구조 없음, 그대로 둡니다"));
    if(a.verify&&a.verify.status==="refuted"&&a.verify.counterexample) tags.appendChild($("span",{class:"v-sub"},"반례: "+(typeof a.verify.counterexample==="string"?a.verify.counterexample:JSON.stringify(a.verify.counterexample))));
    if(tags.childNodes.length) body.appendChild(tags);
  }
  if(a.error) body.appendChild($("div",{class:"note warn",style:"margin-top:6px"},"⚠ "+a.error));
  return $("div",{class:"msg bot"},[$("div",{class:"av"},"MJ"), body]);
}

// ── settings (provider + key + mode) — collapsible, session-only key ─────────────────────────────
function settingsPanel(){
  const provGrid=$("div",{class:"grid cols-2"});
  DATA.providers.forEach(p=>{

function scrLanding(){

function scrChat(){
  const wrap=$("div",{class:"chatwrap"});
  const thread=$("div",{class:"thread",id:"thread"});
  if(!S.messages.length){
    const ex=$("div",{class:"exgrid"});
    DATA.examples.forEach(e=>ex.appendChild($("button",{class:"ex",onclick:()=>{S.input=e.text;render();const t=document.getElementById("composer-input");if(t){t.focus();t.style.height="auto";t.style.height=Math.min(t.scrollHeight,200)+"px";}}},[
      $("span",{class:"ee"},e.kind+" · "+e.label),$("b",{},""),e.text.split("\n")[0]])));
    thread.appendChild($("div",{class:"empty"},[
      $("h2",{},"무엇을 도와드릴까요?"),
      $("p",{class:"lead",style:"margin:0 auto"},"질문이면 답하고, 코딩이면 만들고 검증해 돌려드립니다. 아래 예시로 시작해도 됩니다."),
      ex,
    ]));
  } else {
    S.messages.forEach(m=>{
      if(m.role==="user") thread.appendChild($("div",{class:"msg user"},[$("div",{class:"bubble"},m.text)]));
      else thread.appendChild(renderAssistant(m));
    });
  }
  wrap.appendChild(thread);

  // composer
  const ta=$("textarea",{id:"composer-input",rows:"1",spellcheck:"false",placeholder:"무엇이든 물어보세요 — 질문이면 답하고, 코드를 주거나 만들어 달라면 생성·검증해 돌려드립니다.  (Enter 전송 · Shift+Enter 줄바꿈)"},S.input);
  ta.value=S.input;
  ta.addEventListener("input",e=>{ S.input=e.target.value; e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,200)+"px"; });
  ta.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
  const sendBtn=$("button",{class:"send",title:"전송",disabled:S.streaming?"":null,onclick:()=>sendMessage()}, S.streaming?$("span",{class:"spin"}):"↑");
  const modeChips=DATA.modes.map(m=>$("button",{class:"chip"+(S.mode===m.id?" on":""),title:m.note,onclick:()=>{S.mode=m.id;render();}},m.name));
  const provName=S.provider?(DATA.providers.find(p=>p.id===S.provider)||{}).label:"제공자 · 키";
  const toolrow=$("div",{class:"toolrow"},[
    $("button",{class:"chip"+(S.settingsOpen?" on":""),onclick:()=>{S.settingsOpen=!S.settingsOpen;render();}},"⚿ "+provName+(S.provider&&S.key?" · 키 입력됨":"")),
    $("span",{class:"v-sub",style:"margin:0 4px"},"·"),
    ...modeChips,
  ]);
  const composer=$("div",{class:"composer"},[
    toolrow,
    S.settingsOpen?settingsPanel():null,
    $("div",{class:"cbox"},[ta, sendBtn]),
    $("div",{class:"v-sub",style:"margin-top:7px;text-align:center"}, S.live?"라이브 엔진에 연결됨 — 제안자 ≠ 심판, 키는 이 탭에만 보관":"엔진 연결 대기 중 — 백엔드(server)가 실행 중이어야 응답합니다"),
  ]);
  wrap.appendChild(composer);
  return wrap;
}

const SCREENS={landing:scrLanding, chat:scrChat};

function render(){
  document.documentElement.setAttribute("data-theme",S.theme);
  const root=document.getElementById("root"); root.innerHTML="";
  const app=$("div",{class:"app"});
  const steps=$("nav",{class:"steps","aria-label":"progress"});
  STEPS.forEach(([id,n,label])=>steps.appendChild($("button",{"aria-current":String(S.screen===id),onclick:()=>setScreen(id)},[$("span",{class:"n"},n),label])));
  const acctBtn = S.account
    ? $("button",{class:"ghost",onclick:doLogout},"로그아웃 · "+(S.account.email||"").split("@")[0])
    : $("button",{class:"ghost",onclick:()=>{S.authPanel=!S.authPanel;S.error=null;render();}},"로그인 / 가입");
  app.appendChild($("header",{class:"topbar"},[
    $("div",{class:"brand"},[$("span",{class:"dot"}),"MR.JEFFREY",$("small",{},"안전하게 · 빠르게 · 정확하게")]),
    steps, $("div",{class:"spacer"}), acctBtn,
    $("button",{class:"ghost",onclick:()=>{S.theme=S.theme==="light"?"dark":"light";render();}},S.theme==="light"?"다크":"라이트"),
  ]));
  const main=$("main",{});
  if(S.authPanel && !S.account){
    const em=$("input",{type:"email",placeholder:"이메일",value:S._email||"",oninput:e=>{S._email=e.target.value;}});
    const pwf=$("input",{type:"password",placeholder:"비밀번호 (8자+, 대/소문자·숫자·특수)",oninput:e=>{S._pw=e.target.value;}});
    main.appendChild($("div",{class:"card",style:"max-width:460px;margin:0 auto 18px"},[
      $("div",{class:"eyebrow"},"계정 · 로그인 또는 가입"),
      $("div",{class:"field"},[$("label",{},"이메일"),em]),
      $("div",{class:"field"},[$("label",{},"비밀번호"),pwf]),
      S.error?$("div",{class:"note warn"},S.error):null,
      $("div",{class:"row mt"},[$("button",{class:"btn",onclick:()=>doAuth("login")},"로그인"),
        $("button",{class:"ghost",onclick:()=>doAuth("signup")},"가입"),
        $("button",{class:"ghost",onclick:()=>{S.authPanel=false;render();}},"닫기")]),
      $("div",{class:"honesty"},[$("span",{},"◈"),$("span",{},DATA.account_policy)]),
    ]));
  }
  if(S.account && (S.account.history||[]).length && S.screen==="landing"){
    const hl=$("div",{class:"card",style:"max-width:760px;margin:0 auto 18px"},[$("div",{class:"eyebrow"},"지난 대화 · 결과는 저장됨, 새 실행엔 키를 다시 입력")]);
    S.account.history.slice(0,8).forEach(h=>hl.appendChild($("div",{class:"row",style:"justify-content:space-between;border-top:1px solid var(--line-soft);padding-top:6px;margin-top:6px"},[
      $("span",{class:"v-sub"},(h.request||"").slice(0,60)),$("span",{class:"mono",style:"font-size:11px"},h.proof_tier||h.status||"")])));
    main.appendChild(hl);
  }
  main.appendChild((SCREENS[S.screen]||scrLanding)());
  app.appendChild(main);
  app.appendChild($("footer",{class:"footer"},"안전하게 · 빠르게 · 정확하게 · 제안자 ≠ 심판 · 키는 이 탭에만 보관"));
  if(S.toast) app.appendChild($("div",{class:"toast",role:"status"},["✓ ",S.toast]));
  root.appendChild(app);
}

// detect live back end (served by webapi.app) — chat needs the live engine to call the model + verifier
fetch("/api/health").then(r=>r.json()).then(j=>{S.live=!!(j&&j.ok);render();}).catch(()=>{S.live=false;render();});
render();
</script>
