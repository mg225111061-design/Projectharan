<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>MR.JEFFREY — 안전하게 · 빠르게 · 정확하게</title>
<meta name="description" content="코드를 붙여넣고 제공자를 고르면, 안전하고 빠르고 정확한 코드로 돌려받습니다. 필요한 곳에만 보안을, 진짜 구조가 있는 곳에만 가속을, 그리고 모든 변경은 같은 결과를 내는지 확인합니다." />
<style>
/* MR.JEFFREY — single-file app. Extreme minimalism × extreme dimensionality. White volume, one ink, three
   PILLAR accents (SECURED·FAST·ACCURATE); the few objects are deeply dimensional floating slabs. The promise is
   three words — not a dashboard of numbers. The design system (tokens, slabs, animations, dark mode) is preserved;
   the engine's churning build-time internals never reach this surface. */
:root{
  --page:#fafaf8;--card:#fff;--ink:#1a1a17;--ink-2:#55534c;--muted:#85827a;
  --line:rgba(0,0,0,.12);--line-soft:rgba(0,0,0,.07);
  --fast:#0e9fb5;--fast-deep:#0b5566;--fast-tint:#e4f6f9;
  --normal:#ba7517;--normal-deep:#633806;--normal-tint:#faeeda;
  --extend:#534ab7;--extend-deep:#26215c;--extend-tint:#eeedfe;
  --free:#0f766e;--free-bg:#e6f3f1;--pick:#44423c;
  --r:8px;--r-lg:12px;--focus:#534ab7;--persp:1100px;
  --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR","Pretendard",Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Roboto Mono",monospace;
  /* the three accent families are repurposed to the three PILLARS:
     SECURED → violet (extend, trust/depth) · FAST → teal (fast, speed) · ACCURATE → amber (normal, precision). */
  --accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint);
  --slab:0 1px 1px rgba(20,20,23,.03),0 2px 4px rgba(20,20,23,.035),0 6px 12px rgba(20,20,23,.045),0 14px 28px rgba(20,20,23,.05),0 30px 60px rgba(20,20,23,.06),0 60px 110px rgba(20,20,23,.05);
}
:root[data-theme="dark"]{
  --page:#0e0e10;--card:#171719;--ink:#eceae3;--ink-2:#b7b4ac;--muted:#8c897f;
  --line:rgba(255,255,255,.15);--line-soft:rgba(255,255,255,.08);
  --fast-tint:#0b5566;--normal-tint:#633806;--extend-tint:#26215c;
  --free:#5ec0b4;--free-bg:#13302c;--pick:#c8c5bc;--focus:#a79ef5;
  --slab:0 2px 4px rgba(0,0,0,.4),0 8px 16px rgba(0,0,0,.45),0 18px 36px rgba(0,0,0,.5),0 40px 80px rgba(0,0,0,.55),0 80px 130px rgba(0,0,0,.5);
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--page);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-weight:500;letter-spacing:-.01em;margin:0}
h1{font-size:clamp(28px,4vw,46px);line-height:1.08}h2{font-size:21px}h3{font-size:16px}
p{margin:0 0 12px;color:var(--ink-2)}a{color:var(--accent-deep)}
.mono,.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
/* ★ the [data-mode] accent-swapping mechanism, repurposed to the three pillars (kept verbatim in spirit) */
[data-mode="secured"]{--accent:var(--extend);--accent-deep:var(--extend-deep);--accent-tint:var(--extend-tint)}
[data-mode="fast"]{--accent:var(--fast);--accent-deep:var(--fast-deep);--accent-tint:var(--fast-tint)}
[data-mode="accurate"]{--accent:var(--normal);--accent-deep:var(--normal-deep);--accent-tint:var(--normal-tint)}
.app{min-height:100%;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line-soft);background:color-mix(in srgb,var(--page) 82%,transparent);backdrop-filter:saturate(1.2) blur(8px);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:9px;font-weight:500;letter-spacing:.02em}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint);transition:.25s}
.brand small{color:var(--muted);font-weight:400}
.steps{display:flex;gap:2px;margin-left:8px;flex-wrap:wrap}
.steps button{font:inherit;font-size:12.5px;color:var(--muted);background:none;border:0;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.steps button:hover{color:var(--ink);background:var(--page)}
.steps button[aria-current="true"]{color:var(--ink);background:var(--accent-tint)}
.steps button:disabled{opacity:.4;cursor:not-allowed}.steps .n{font-family:var(--mono);font-size:11px;opacity:.7}
.spacer{margin-left:auto}
.ghost{font:inherit;font-size:13px;background:none;border:1px solid var(--line);color:var(--ink-2);padding:7px 12px;border-radius:var(--r);cursor:pointer}
.ghost:hover{border-color:var(--ink-2);color:var(--ink)}
main{flex:1;width:100%;max-width:1040px;margin:0 auto;padding:34px 22px 80px;perspective:var(--persp);perspective-origin:50% 22%;animation:screenIn .42s cubic-bezier(.2,.8,.2,1) both}
.wide{max-width:1180px}
@keyframes screenIn{from{opacity:0;transform:perspective(var(--persp)) translateY(14px) translateZ(-40px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.lead{font-size:16px;color:var(--ink-2);max-width:62ch}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grid{display:grid;gap:14px}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.cols-3,.cols-2{grid-template-columns:1fr}}
.btn{font:inherit;font-size:14px;font-weight:500;cursor:pointer;background:var(--accent);color:#fff;border:1px solid var(--accent-deep);padding:10px 18px;border-radius:var(--r);transition:filter .15s}
.btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.lg{font-size:15px;padding:12px 22px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
.kbd{font-family:var(--mono);font-size:12px;background:var(--track,#efeee9);padding:1px 6px;border-radius:5px}
.badge-free{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;color:var(--free);background:var(--free-bg)}
.badge-free .gd{width:6px;height:6px;border-radius:50%;background:currentColor}
.getkey{font-family:var(--mono);font-size:11.5px;color:var(--free);text-decoration:none}.getkey:hover{text-decoration:underline}
/* dimensionality — the 3D floating slab, preserved verbatim */
.slab{position:relative;background:var(--card);border-radius:18px;padding:22px 24px;box-shadow:var(--slab);transform:perspective(var(--persp)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--lift,0px));transform-style:preserve-3d;transition:box-shadow .4s;will-change:transform}
.slab::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(177deg,rgba(255,255,255,.5),transparent 24%);opacity:.55}
:root[data-theme="dark"] .slab::before{background:linear-gradient(177deg,rgba(255,255,255,.08),transparent 24%)}
.slab::after{content:"";position:absolute;left:8%;right:8%;bottom:-26px;height:40px;z-index:-1;background:radial-gradient(60% 100% at 50% 0%,rgba(20,20,23,.16),transparent 70%);filter:blur(8px);transform:translateZ(-60px);opacity:.7}
.plane{transform:translateZ(var(--z,0px))}
.float-in{animation:floatIn .7s cubic-bezier(.2,.8,.2,1) both}
@keyframes floatIn{from{opacity:0;transform:perspective(var(--persp)) rotateX(10deg) translateY(26px) translateZ(-80px)}to{opacity:1;transform:none}}
.hero{display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:center;min-height:min(66vh,560px);padding:20px 0 50px}
.hero-copy h1{max-width:17ch}.hero-cap{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px}
@media(max-width:880px){.hero{grid-template-columns:1fr;gap:28px;min-height:0}.hero>div:last-child{order:-1}}
.tenets{margin:4px 0 40px;gap:36px}.feat h3{font-size:15px;margin-bottom:8px;position:relative;padding-top:14px}
.feat h3::before{content:"";position:absolute;top:0;left:0;width:22px;height:2px;background:var(--accent);border-radius:2px}
.feat p{margin:0}
/* the three PILLAR slabs — each in its own repurposed accent (data-mode), reusing the 3D treatment */
.pillar-stack{display:flex;flex-direction:column;gap:18px}
.pillar{text-align:left;padding:20px 22px}
.pillar .p-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pillar .glyph{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--accent-tint);color:var(--accent-deep);flex:none;font-size:17px}
.pillar .p-name{font-weight:600;font-size:16px;letter-spacing:.04em}
.pillar .p-word{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-tint);padding:2px 8px;border-radius:999px;margin-left:auto}
.pillar p{margin:0;font-size:14px;color:var(--ink-2)}
.hero-pillars{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;width:100%}
.hero-pillars .pillar{padding:16px 18px}
.mode-card{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;cursor:pointer;display:flex;flex-direction:column;gap:10px;font:inherit;color:var(--ink);transform:perspective(var(--persp)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--lift,0px));transition:box-shadow .35s,border-color .18s}
.mode-card:hover{border-color:var(--accent)}.mode-card[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 24px rgba(0,0,0,.06)}
.mc-head{display:flex;align-items:center;gap:10px}.glyph{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--accent-tint);color:var(--accent-deep);flex:none;font-size:16px}
.mc-name{font-weight:500;font-size:16px}.mc-clock{font-family:var(--mono);font-size:11px;color:var(--muted)}
.provider-card{flex-direction:row;align-items:center;gap:12px}.provider-card[aria-pressed="true"]{border-color:var(--pick);box-shadow:0 0 0 1px var(--pick),0 8px 24px rgba(0,0,0,.06)}
.provider-card .glyph{background:var(--track,#efeee9);color:var(--pick)}
.v-sub{color:var(--muted);font-size:12px}
.editor{width:100%;min-height:240px;resize:vertical;font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;tab-size:4}
.outcode{width:100%;white-space:pre;overflow:auto;font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;tab-size:4;margin:0}
.samples{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 10px}
.samples button,.upload{font:inherit;font-size:12px;font-family:var(--mono);background:var(--page);border:1px solid var(--line);color:var(--ink-2);padding:5px 10px;border-radius:6px;cursor:pointer}
.samples button:hover,.upload:hover{border-color:var(--accent);color:var(--ink)}.upload input{display:none}
.field{display:flex;flex-direction:column;gap:6px;margin:0 0 12px}.field label{font-size:13px;color:var(--ink-2)}
.field input{font:inherit;font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--page);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px}
.note{font-size:12.5px;color:var(--muted)}.note.good{color:var(--free)}.note.warn{color:var(--normal-deep)}
.honesty{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);background:var(--card);border:1px dashed var(--line);border-radius:var(--r);padding:12px 14px;margin:16px 0 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 22px;margin:0 0 16px}
.demo-banner{display:flex;gap:9px;align-items:center;font-size:12.5px;color:var(--ink-2);background:var(--accent-tint);border:1px solid var(--line-soft);border-radius:var(--r);padding:10px 14px;margin:0 0 16px}
.spin{width:15px;height:15px;border:2px solid var(--accent-tint);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:9px;background:var(--card);color:var(--ink);font-size:13.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:var(--slab);z-index:50;animation:toastIn .4s cubic-bezier(.2,.8,.2,1) both}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
.footer{color:var(--muted);font-size:12px;text-align:center;padding:24px;border-top:1px solid var(--line)}
.mt{margin-top:14px}.muted{color:var(--muted)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:560px){:root{--slab:0 2px 6px rgba(20,20,23,.06),0 10px 22px rgba(20,20,23,.07),0 24px 44px rgba(20,20,23,.06)}.slab::after{display:none}}
</style>

<div id="root"></div>
<script>
// ── The product is three words: SECURED · FAST · ACCURATE. The DATA blob carries ONLY what the new UI needs —
// the provider list (real, useful) and the session-only key policy. No engine build-time internals (the
// churning measured numbers, the pass/badge machinery, the corpus rows, the mode-internals) reach this surface —
// they churn every build and are not the product. The three pillars don't churn; only the engine behind them does.
const DATA = {
  "pillars":[
    {"id":"secured","word":"SECURED","name":"안전하게","glyph":"⛨",
     "line":"필요한 곳의 취약점과 부채널 누수를 닫습니다 — 그리고 필요 없는 곳은 건드리지 않습니다."},
    {"id":"fast","word":"FAST","name":"빠르게","glyph":"⚡",
     "line":"진짜 구조가 있는 곳에선 실제로 빠르게, 없는 곳에선 정직하게 그대로."},
    {"id":"accurate","word":"ACCURATE","name":"정확하게","glyph":"✓",
     "line":"보여드리기 전에, 모든 변경이 같은 결과를 내는지 확인합니다."}
  ],
  "providers":[
    {"id":"gemini","label":"Gemini (Google)","transport":"gemini_generate","default_model":"gemini-3.5-flash","free_no_card":true,"key_label":"Google AI Studio API key","get_key_url":"https://aistudio.google.com/apikey"},
    {"id":"groq","label":"Groq","transport":"openai_chat","default_model":"llama-3.3-70b-versatile","free_no_card":true,"key_label":"Groq API key","get_key_url":"https://console.groq.com/keys"},
    {"id":"anthropic","label":"Claude (official)","transport":"anthropic_sdk","default_model":"claude-opus-4-8","free_no_card":false,"key_label":"Anthropic API key","get_key_url":"https://console.anthropic.com/settings/keys"},
    {"id":"anthropic_compat","label":"Claude-compatible gateway","transport":"anthropic_sdk","default_model":"claude-opus-4-8","free_no_card":false,"key_label":"Claude-compatible gateway API key","get_key_url":null},
    {"id":"openai","label":"ChatGPT (OpenAI)","transport":"openai_chat","default_model":"gpt-4o","free_no_card":false,"key_label":"OpenAI API key","get_key_url":"https://platform.openai.com/api-keys"},
    {"id":"openai_compat","label":"OpenAI-compatible gateway","transport":"openai_chat","default_model":"","free_no_card":false,"key_label":"OpenAI-compatible gateway API key","get_key_url":null}
  ],
  "key_policy":"API key is session-only: held in this browser tab for the request, never logged, never stored, never committed, never sent anywhere except the provider you choose."
};

<script>
"use strict";
// MR.JEFFREY single-file app. Vanilla JS, embedded CSS, no toolchain. When served behind the FastAPI back end
// (webapi.app) it upgrades to LIVE calls (/api/optimize, /api/key/validate) on your exact code; opened as a
// file:// it runs in STATIC (demo) mode — representative human-readable outcomes, clearly labelled a demo, never
// fabricated measurements presented as live. The API key is held in a JS variable for the tab only.
const $ = (t, p = {}, kids = []) => {
  const e = document.createElement(t);
  for (const k in p) {
    if (k === "class") e.className = p[k];
    else if (k === "html") e.innerHTML = p[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), p[k]);
    else if (k === "style") e.setAttribute("style", p[k]);
    else if (p[k] != null) e.setAttribute(k, p[k]);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach((c) => c != null && e.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
  return e;
};
const STEPS = [["landing","0","개요"],["code","1","코드 · 제공자"],["result","2","결과"]];
const SAMPLES = [
  ["로그인 / 비밀번호 (보안 민감)","def check_login(password, stored_hash):\n    import hmac\n    return hmac.compare_digest(hash_pw(password), stored_hash)"],
  ["루프 안 멤버십 검사 (느림)","def dedup(items, seen):\n    out = []\n    for it in items:\n        if it in seen:\n            continue\n        seen.append(it)\n        out.append(it)\n    return out"],
  ["거듭제곱 합 (구조 있음)","def total(n):\n    s = 0\n    for k in range(n):\n        s += k * k\n    return s"],
  ["깔끔한 코드 (바꿀 것 없음)","def total(prices):\n    return sum(prices)"]
];
const S = { screen:"landing", provider:null, key:"", model:"", code:"", result:null, busy:false,
  live:false, theme:(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"), keyState:{phase:"idle"}, toast:null };
let TOAST_T = null;

// ── pointer tilt on every .slab / .mode-card (real CSS 3D), reduced-motion safe ─────────────────────────────
const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;
function attachTilt(el, max){
  if(REDUCE) return; let raf=0,tx=0,ty=0,cx=0,cy=0,tl=0,lift=0;
  const tick=()=>{ cx+=(tx-cx)*.12; cy+=(ty-cy)*.12; lift+=(tl-lift)*.12;
    el.style.setProperty("--rx",cx.toFixed(2)+"deg"); el.style.setProperty("--ry",cy.toFixed(2)+"deg"); el.style.setProperty("--lift",lift.toFixed(1)+"px");
    raf=(Math.abs(tx-cx)>.01||Math.abs(ty-cy)>.01||Math.abs(tl-lift)>.05)?requestAnimationFrame(tick):0; };
  el.addEventListener("pointermove",e=>{ const r=el.getBoundingClientRect(); tx=-((e.clientY-r.top)/r.height-.5)*max; ty=((e.clientX-r.left)/r.width-.5)*max; tl=6; if(!raf)raf=requestAnimationFrame(tick); });
  el.addEventListener("pointerleave",()=>{ tx=0;ty=0;tl=0; if(!raf)raf=requestAnimationFrame(tick); });
}
function setScreen(s){ S.screen=s; render(); }
function showToast(m){ S.toast=m; render(); clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>{S.toast=null;render();},3200); }

// ── a PILLAR slab (3D), in its own repurposed accent. Pure human words — never a number, never a grade ──────
function pillarSlab(p, extraClass){
  const slab=$("div",{class:"slab pillar float-in "+(extraClass||""),"data-mode":p.id},[
    $("div",{class:"p-head"},[$("span",{class:"glyph"},p.glyph),$("span",{class:"p-name"},p.name),$("span",{class:"p-word"},p.word)]),
    $("p",{},p.line),
  ]);
  setTimeout(()=>attachTilt(slab,6),0);
  return slab;
}

// ── STATIC demo: a light, honest heuristic on the pasted code → representative human outcomes (NO numbers,
//    NO grades). Labelled a demo. The live engine (server) produces the real per-run result. ─────────────────
function staticOutcomes(code){
  const c=code||""; const hasLoop=/\b(for|while)\b/.test(c);
  const sensitive=/\b(password|passwd|secret|token|api[_-]?key|hmac|hashlib|secrets|jwt|ssn|credit|encrypt|decrypt|login|sql|execute|cursor)\b/i.test(c);
  const membership=hasLoop && /\bin\s+\w+\b/.test(c) && /\.append\s*\(/.test(c);
  const sumloop=hasLoop && /\+=/.test(c);
  const clean=!hasLoop && /\breturn\s+sum\s*\(/.test(c);
  const secured = sensitive
    ? "주입·경계·메모리 안전을 점검하고, 민감한 경로는 상수 시간으로 보강했습니다."
    : "보안에 민감한 코드가 없습니다 — 닫을 것이 없어 그대로 둡니다.";
  let fast;
  if(membership) fast="리스트 멤버십 검사를 해시 조회로 바꿔 반복 비용을 줄였습니다.";
  else if(sumloop) fast="누적 루프에서 닫힌 형식을 찾아 반복을 접었습니다.";
  else if(clean) fast="이미 효율적입니다 — 안전하게 바꿀 것이 없습니다.";
  else fast="안전하게 빠르게 만들 구조를 찾지 못했습니다 — 그대로 둡니다.";
  const accurate = (membership||sumloop)
    ? "바꾼 코드가 원본과 같은 결과를 내는지 확인했습니다."
    : "변경이 없으므로 결과는 원본과 동일합니다.";
  return {secured,fast,accurate,changed:(membership||sumloop)};
}

async function runOptimize(){
  const code=S.code;
  if(S.live){
    try{
      const r=await fetch("/api/optimize",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({code,provider:S.provider||undefined,key:S.key||undefined,model:S.model||undefined})});
      const j=await r.json();
      return { live:true, raw:j };
    }catch(e){ /* fall through to static demo */ }
  }
  return { live:false, demo:staticOutcomes(code), code };
}

// translate a LIVE engine result into the three human pillar outcomes — NEVER showing engine numbers or badges.
function liveOutcomes(raw){
  const r=raw||{};
  const sec = (r.security && r.security.text) ? r.security.text
            : (r.security && r.security.sensitive===false) ? "보안에 민감한 코드가 없습니다 — 닫을 것이 없습니다."
            : "보안 점검을 실행했습니다 (자세한 내용은 엔진 로그).";
  const shipped = Array.isArray(r.shipped)? r.shipped : [];
  const fast = shipped.length ? "안전하게 더 빠른 코드로 바꿨습니다." : "이미 효율적입니다 — 안전하게 바꿀 것이 없습니다.";
  const acc = shipped.length ? "바꾼 코드가 원본과 같은 결과를 내는지 확인했습니다."
            : (r.note? "변경 없음 — 결과는 원본과 동일합니다." : "변경이 없으므로 결과는 원본과 동일합니다.");
  return {secured:sec,fast,accurate:acc,changed:shipped.length>0};
}

async function validateKey(){
  const p=S.provider; if(!p||!S.key){return;}
  S.keyState={phase:"checking"}; render();
  if(S.live){
    try{ const r=await fetch("/api/key/validate",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({provider:p,key:S.key,model:S.model||undefined})}); const j=await r.json(); S.keyState={phase:j.ok?"ok":"bad",res:j}; render(); return; }
    catch(e){ S.keyState={phase:"bad",res:{detail:String(e)}}; render(); return; }
  }
  const prov=DATA.providers.find(x=>x.id===p);
  S.keyState={phase:"bad",res:{blocked:true,detail:"정적 빌드(서버 없음): 라이브 키 확인은 백엔드가 필요합니다. 키는 이 탭에만 보관되며 저장·로그되지 않습니다. 키 발급: "+(prov&&prov.get_key_url||"")}};
  render();
}

// ── screens ─────────────────────────────────────────────────────────────────────────────────────────────
function scrLanding(){
  return $("div",{},[
    $("section",{class:"hero"},[
      $("div",{class:"hero-copy"},[
        $("div",{class:"eyebrow"},"안전하게 · 빠르게 · 정확하게"),
        $("h1",{},"코드를 붙여넣으면, 안전하고 빠르고 정확하게 돌려드립니다."),
        $("p",{class:"lead mt"},"MR.JEFFREY는 세 가지를 약속합니다. 필요한 곳의 취약점을 닫고(SECURED), 진짜 구조가 있는 곳을 더 빠르게 만들고(FAST), 모든 변경이 같은 결과를 내는지 확인합니다(ACCURATE). 못 하는 곳은 정직하게 그대로 둡니다."),
        $("div",{class:"row mt"},[
          $("button",{class:"btn lg",onclick:()=>setScreen("code")},"코드 붙여넣기 →"),
          S.live?$("span",{class:"badge-free"},[$("span",{class:"gd"}),"라이브 엔진"]):$("span",{class:"pill"},"데모 모드"),
        ]),
      ]),
      $("div",{},[$("div",{class:"hero-pillars"},DATA.pillars.map(p=>pillarSlab(p)))]),
    ]),
    $("div",{class:"grid cols-3 tenets"},[
      $("div",{class:"feat","data-mode":"secured"},[$("h3",{},"필요한 곳에만 보안"),$("p",{},"비밀번호·키·인증·암호처럼 보안이 중요한 코드만 검증 레이어가 켜집니다. 평범한 계산은 건드리지 않아 느려지지 않습니다.")]),
      $("div",{class:"feat","data-mode":"fast"},[$("h3",{},"진짜일 때만 빠르게"),$("p",{},"실제로 빠르게 만들 구조가 있을 때만 바꿉니다. 없으면 ‘이미 효율적’이라고 정직하게 말합니다 — 과장된 배수는 없습니다.")]),
      $("div",{class:"feat","data-mode":"accurate"},[$("h3",{},"바꿨으면 확인"),$("p",{},"모든 변경은 보여드리기 전에 같은 결과를 내는지 확인합니다. 확인할 수 없으면 바꾸지 않고 그대로 둡니다.")]),
    ]),
    $("div",{class:"honesty"},[$("span",{},"◈"),$("span",{html:"LLM은 코드를 <strong>제안</strong>하지만 맞는지는 보장하지 않습니다 — MR.JEFFREY가 그 위에서 <strong>확인</strong>합니다. API 키는 이 브라우저 탭에만 보관되며, 저장·로그·커밋되지 않고 당신이 고른 제공자 외 어디로도 전송되지 않습니다."})]),
  ]);
}

function scrCode(){
  const ta=$("textarea",{class:"editor",spellcheck:"false",placeholder:"def my_function(...):\n    ..."},S.code);
  ta.value=S.code; ta.addEventListener("input",e=>{S.code=e.target.value;});
  const samples=$("div",{class:"samples"},[$("span",{class:"muted",style:"align-self:center;font-size:12px"},"예시:")]);
  SAMPLES.forEach(([label,code])=>samples.appendChild($("button",{onclick:()=>{S.code=code;render();}},label)));
  const up=$("label",{class:"upload"},[".py 업로드 ↑"]);
  const fi=$("input",{type:"file",accept:".py,.txt"}); fi.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{S.code=String(r.result||"");render();};r.readAsText(f);e.target.value="";});
  up.appendChild(fi); samples.appendChild(up);
  // provider selector (kept — real and useful): free-no-card badges + get-key links + session-only key handling
  const provGrid=$("div",{class:"grid cols-2 mt"});
  DATA.providers.forEach(p=>{
    const card=$("button",{class:"mode-card provider-card","aria-pressed":String(S.provider===p.id),onclick:()=>{S.provider=p.id;S.model=p.default_model;S.keyState={phase:"idle"};render();}},[
      $("div",{class:"mc-head",style:"width:100%"},[$("span",{class:"glyph"},"⚿"),
        $("div",{style:"flex:1"},[$("div",{class:"mc-name",style:"font-size:15px"},p.label),$("div",{class:"mc-clock"},p.transport)]),
        p.free_no_card?$("span",{class:"badge-free"},[$("span",{class:"gd"}),"무료 · 카드 불필요"]):null]),
      $("div",{class:"row",style:"width:100%;justify-content:space-between"},[$("span",{class:"v-sub"},[$("span",{},"기본: "),$("span",{class:"mono"},p.default_model||"—")]),
        p.get_key_url?$("a",{class:"getkey",href:p.get_key_url,target:"_blank",rel:"noreferrer",onclick:e=>e.stopPropagation()},"키 발급 ↗"):null]),
    ]);
    setTimeout(()=>attachTilt(card,5),0); provGrid.appendChild(card);
  });
  const sel=DATA.providers.find(p=>p.id===S.provider);
  const keyCard = sel ? (()=>{
    const keyInput=$("input",{type:"password",autocomplete:"off",spellcheck:"false",placeholder:`${sel.label} 키를 붙여넣으세요…`,value:S.key,oninput:e=>{S.key=e.target.value;S.keyState={phase:"idle"};},onblur:()=>{if(S.key)validateKey();}});
    const modelInput=$("input",{spellcheck:"false",placeholder:sel.default_model,value:S.model,oninput:e=>{S.model=e.target.value;}});
    const ks=S.keyState;
    return $("div",{class:"card mt"},[
      $("div",{class:"row",style:"gap:18px;align-items:flex-start"},[
        $("div",{class:"field",style:"flex:2;min-width:240px;margin:0"},[$("label",{},`${sel.key_label}`),keyInput]),
        $("div",{class:"field",style:"flex:1;min-width:170px;margin:0"},[$("label",{},"모델"),modelInput]),
      ]),
      $("div",{class:"row mt"},[
        $("button",{class:"ghost",onclick:()=>validateKey(),disabled:(!S.key||ks.phase==="checking")?"":null},ks.phase==="checking"?$("span",{class:"spin"}):"키 확인"),
        ks.phase==="ok"?$("span",{class:"note good"},`유효함 — ${sel.label} 라이브 호출이 200을 반환했습니다.`):null,
        ks.phase==="bad"&&ks.res?$("span",{class:"note warn"},(ks.res.blocked?"⚠ ":"✕ ")+(ks.res.detail||"")):null,
      ]),
      $("div",{class:"honesty"},[$("span",{},"◈"),$("span",{},`키는 이 세션에만 머무릅니다 — 저장·기록·로그·커밋되지 않고, 오직 ${sel.label}의 API로만 전송됩니다.`)]),
    ]);
  })() : null;
  const runBtn=$("button",{class:"btn lg",onclick:async()=>{ if(!S.code.trim())return; S.busy=true; runBtn.disabled=true; runBtn.textContent="확인 중…"; S.result=await runOptimize(); S.busy=false; setScreen("result"); showToast("완료 — 안전하게 · 빠르게 · 정확하게 점검했습니다"); }},"코드 점검 실행 →");
  return $("div",{},[
    $("div",{class:"eyebrow"},"1단계 · 당신의 코드와 제공자"),$("h2",{},"함수를 붙여넣고, 제공자를 고르세요."),
    $("p",{class:"lead"},"LLM은 더 나은 코드를 제안만 하고, 무엇을 돌려줄지는 검증기가 정합니다. Groq과 Gemini는 신용카드 없이 무료입니다. 키 없이 건너뛰어도 됩니다 — 그땐 엔진의 검증만 돌아갑니다."),
    samples, ta,
    $("div",{class:"eyebrow",style:"margin-top:22px"},"제공자 (선택)"),
    provGrid, keyCard,
    $("div",{class:"row mt"},[runBtn, S.provider?$("span",{class:"pill"},"제안자: "+S.provider):$("span",{class:"pill"},"제공자 없이 검증만"),
      S.provider?$("button",{class:"ghost",onclick:()=>{S.provider=null;S.key="";S.keyState={phase:"idle"};render();}},"제공자 해제"):null]),
  ]);
}

function scrResult(){
  const r=S.result;
  if(!r) return $("div",{},[$("p",{},"아직 실행하지 않았습니다."),$("button",{class:"btn",onclick:()=>setScreen("code")},"코드로 가기")]);
  const out = r.live ? liveOutcomes(r.raw) : r.demo;
  const wrap=$("div",{},[
    $("div",{class:"eyebrow"},"2단계 · 결과"),$("h2",{},"안전하게 · 빠르게 · 정확하게."),
  ]);
  if(!r.live) wrap.appendChild($("div",{class:"demo-banner"},[$("span",{},"◈"),$("span",{html:"<strong>데모 모드</strong> — 아래는 당신 코드에 대한 <em>예시</em> 결과입니다(실측·실변환 아님). 실제 변환은 라이브 엔진(server)에서 실행됩니다."})]));
  // the three pillar outcomes — human sentences, each in its accent. No numbers, no badges, no meters.
  const pmap={secured:out.secured,fast:out.fast,accurate:out.accurate};
  const stack=$("div",{class:"pillar-stack mt"});
  DATA.pillars.forEach(p=>{
    const slab=$("div",{class:"slab pillar float-in","data-mode":p.id},[
      $("div",{class:"p-head"},[$("span",{class:"glyph"},p.glyph),$("span",{class:"p-name"},p.name),$("span",{class:"p-word"},p.word)]),
      $("p",{},pmap[p.id]||""),
    ]);
    setTimeout(()=>attachTilt(slab,5),0);
    stack.appendChild(slab);
  });
  wrap.appendChild(stack);
  // the output code — the main deliverable. Live: the returned code. Static: the input, labelled as the demo basis.
  const outputCode = r.live ? ((r.raw&&(r.raw.code||r.raw.optimized||r.raw.output))||S.code) : (r.code||S.code);
  const codeCard=$("div",{class:"card mt"},[
    $("div",{class:"row",style:"justify-content:space-between"},[
      $("div",{class:"eyebrow",style:"margin:0"},r.live?(out.changed?"돌려받은 코드":"코드 (변경 없음)"):"코드 (데모 — 라이브 엔진이 변환합니다)"),
      $("button",{class:"ghost",onclick:()=>{navigator.clipboard&&navigator.clipboard.writeText(outputCode);showToast("복사했습니다");}},"복사"),
    ]),
    $("pre",{class:"outcode mt"},outputCode||""),
  ]);
  wrap.appendChild(codeCard);
  wrap.appendChild($("div",{class:"honesty"},[$("span",{},"◈"),$("span",{},DATA.key_policy+" (당신의 키는 이 탭을 떠나지 않습니다.)")]));
  wrap.appendChild($("div",{class:"row mt"},[$("button",{class:"ghost",onclick:()=>setScreen("code")},"← 다시 실행"),$("button",{class:"ghost",onclick:()=>{S.code="";S.result=null;S.provider=null;S.key="";setScreen("landing");}},"↺ 처음부터")]));
  return wrap;
}

const SCREENS={landing:scrLanding,code:scrCode,result:scrResult};

function render(){
  document.documentElement.setAttribute("data-theme",S.theme);
  const root=document.getElementById("root"); root.innerHTML="";
  const app=$("div",{class:"app"});
  const steps=$("nav",{class:"steps","aria-label":"progress"});
  const reached={landing:1,code:1,result:!!S.result};
  STEPS.forEach(([id,n,label])=>steps.appendChild($("button",{"aria-current":String(S.screen===id),disabled:reached[id]?null:"",onclick:()=>reached[id]&&setScreen(id)},[$("span",{class:"n"},n),label])));
  app.appendChild($("header",{class:"topbar"},[
    $("div",{class:"brand"},[$("span",{class:"dot"}),"MR.JEFFREY",$("small",{},"안전하게 · 빠르게 · 정확하게")]),
    steps, $("div",{class:"spacer"}),
    $("button",{class:"ghost",onclick:()=>{S.theme=S.theme==="light"?"dark":"light";render();}},S.theme==="light"?"다크":"라이트"),
  ]));
  const cur=SCREENS[S.screen]||scrLanding;
  const main=$("main",{class:(S.screen==="result")?"wide":""});
  main.appendChild(cur());
  app.appendChild(main);
  app.appendChild($("footer",{class:"footer"},"안전하게 · 빠르게 · 정확하게 · 제안자 ≠ 심판 · 키는 이 탭에만 보관"));
  if(S.toast) app.appendChild($("div",{class:"toast",role:"status"},["✓ ",S.toast]));
  root.appendChild(app);
}

// detect live back end (served by webapi.app) — else stay in honest STATIC (demo) mode
fetch("/api/health").then(r=>r.json()).then(j=>{S.live=!!(j&&j.ok);render();}).catch(()=>{S.live=false;});
render();
</script>
