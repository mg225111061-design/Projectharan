<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Mr. Jeffrey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/design.css">
<script src="/static/site.js"></script>
<style>
  .auth-wrap{max-width:440px;margin:0 auto}
  .auth-card{margin-top:24px}
  .auth-card h1{font-size:30px;margin-bottom:6px}
  .auth-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .remember{display:flex;align-items:center;gap:10px;margin:6px 0 18px;cursor:pointer;font-size:14px;font-weight:700}
  .remember input{width:20px;height:20px;accent-color:var(--ink);cursor:pointer}
  .remember .hint{font-weight:600;color:var(--muted);font-size:12px}
  .msg{font-size:13px;font-weight:700;margin-top:12px;min-height:18px}
  .auth-foot{margin-top:18px;font-size:13.5px;color:var(--muted);text-align:center}
  .auth-foot a{font-weight:800;color:var(--ink)}
  /* TODO(next step): Google OAuth — placeholder only, intentionally not wired this stage. */
  .oauth-slot{margin-top:16px;opacity:.5;pointer-events:none}
</style>
</head>
<body>
<div class="wrap auth-wrap">
  <header class="site-head">
    <a class="brand" href="/" style="text-decoration:none">Mr.&nbsp;Jeffrey<span class="dot"></span></a>
    <button class="icon-btn" data-theme-toggle aria-label="toggle dark mode">☀</button>
  </header>

  <div class="card auth-card">
    <h1>로그인</h1>
    <div class="sub">다시 오신 걸 환영합니다.</div>
    <form id="form" novalidate>
      <div class="field">
        <label for="email">이메일 · Email</label>
        <input class="input" id="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">비밀번호 · Password</label>
        <input class="input" id="password" type="password" autocomplete="current-password" required>
      </div>
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>로그인 상태 유지 <span class="hint">(체크: 오래 유지 · 미체크: 브라우저 닫으면 로그아웃)</span></span>
      </label>
      <button class="btn btn-primary" id="submit" type="submit" style="width:100%">로그인</button>
      <div class="msg" id="msg" aria-live="polite"></div>
    </form>
    <!-- TODO(next step): Google OAuth button goes here (not implemented this stage). -->
    <div class="oauth-slot"><button class="btn btn-ghost" style="width:100%" disabled>Google로 계속 (준비 중)</button></div>
    <div class="auth-foot">계정이 없나요? <a href="/signup">회원가입</a></div>
  </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const msg = document.getElementById("msg"); msg.className="msg"; msg.textContent="";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;   // ★ real session-lifetime switch ★
  document.getElementById("submit").disabled = true;
  try{
    const r = await fetch("/api/auth/login", {method:"POST", headers:{"content-type":"application/json"},
      credentials:"same-origin", body:JSON.stringify({email, password, remember})});
    const d = await r.json();
    if(r.ok && d.ok){ location.href="/app"; }
    else { msg.classList.add("err"); msg.textContent = d.message || "이메일 또는 비밀번호가 올바르지 않습니다."; }
  }catch(err){ msg.classList.add("err"); msg.textContent="네트워크 오류 — 다시 시도해 주세요."; }
  finally{ document.getElementById("submit").disabled = false; }
});
</script>
</body>
</html>
